name = "urlteq"
main = "src/index.js"
compatibility_date = "2024-01-01"

# ── KV namespace (short link store + cache) ───────────────────
# 本地开发时 wrangler 自动用 SQLite 模拟，id 只在部署到 Cloudflare 时才需要真实值
[[kv_namespaces]]
binding = "URLS"
id = "在这里填第二步的id"
preview_id = "在这里填第二步preview的id"

# ── Environment variables ─────────────────────────────────────
[vars]
RESEND_API_KEY = ""                              # 可选：get free key at resend.com
NOTIFY_FROM    = "noreply@urlteq.com"
BASE_URL       = "https://urlteq.com"

# ── Cron: runs daily at 09:00 UTC to send expiry reminders ────
[triggers]
crons = ["0 9 * * *"]

# ── Production route (有自己域名时取消注释) ──────────────────
# [[routes]]
# pattern = "urlteq.com/*"
# zone_name = "urlteq.com"
