name = "urlteq"
main = "src/index.js"
compatibility_date = "2024-01-01"
workers_dev = true

# ── KV namespace (short link store + cache) ───────────────────
# 本地开发时 wrangler 自动用 SQLite 模拟，id 只在部署到 Cloudflare 时才需要真实值
[[kv_namespaces]]
binding = "URLS"
id = "95b5b02f7d9e4ae3823f5ce73ca67f17"
preview_id = "ad077d9085b747908d7ce9e95e80bfb9"

# ── D1 database (atomic click counter) ───────────────────────
# Create with:  wrangler d1 create urlteq-clicks
# Then paste the real database_id below.
[[d1_databases]]
binding = "DB"
database_name = "urlteq-clicks"
database_id = "aadfa22e-b6f6-49a8-94e2-a5dcd2bb6e2f"
migrations_dir = "migrations"

# ── Environment variables ─────────────────────────────────────
[vars]
RESEND_API_KEY = ""                              # 可选：get free key at resend.com
NOTIFY_FROM    = ""   # set your sender email here (must be verified in Resend)
BASE_URL       = "https://urlteq.com"

# ── Cron: runs daily at 09:00 UTC to send expiry reminders ────
[triggers]
crons = ["0 9 * * *"]

# ── Production route ─────────────────────────────────────────
[[routes]]
pattern = "urlteq.com/*"
zone_name = "urlteq.com"
